<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiago-Validador de Formulários</title>
    <!-- estilos -->
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <form method="POST" action="cadastro.php" class="formularioLogin">
        <div class=" 
            container-lg 
            mt-lg-5 
            p-4 d-flex 
            flex-column 
            align-items-center 
            bg-opacity-10 
            bg-black mh-100">
            <h3>Crie uma conta</h3>
            <div class="col-4 mb-4">
                <input type="text" class="form-control" placeholder="Nome completo" aria-label="nome" required   minlength="6"
                maxlength="6">
            </div>
            <div class="col-4 mb-4">
                <input type="password" class="form-control" placeholder="Senha" aria-label="senha" required
                    minlength="6" maxlength="6">
            </div>
            <div class="d-grid col-4 mx-auto mb-2">
                <button type="submit" value="Cadastrar" class="btn btn-outline-secondary">Cadastrar</button>
            </div>
            <div class="d-flex gap-1">
                <p>Já tem uma conta?</p>
                <p><a href="#" class="link-underline-secondary">Faça o login</a></p>
            </div>
        </div>
    </form>
    <script src="script.js"></script>

</body>

</html>
